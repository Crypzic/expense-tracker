<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <title>Expense Tracker</title>
</head>
<body>
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <p>Delete this transaction?</p>
      <div class="modal-buttons">
        <button id="confirmDelete">Yes, Delete</button>
        <button id="cancelDelete">Cancel</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="left-panel">
      <div class="header">
        <span style="font-size: 2rem;">💰</span>
        <h1>EXPENSE TRACKER</h1>
      </div>
      <div class="balance-summary">
        <h2>Balance Summary</h2>
        <div class="total-balance" id="totalBalance">$0.00</div>
        <div class="income-expense">
          <div class="income">
            <h3>Total Income</h3>
            <p id="totalIncome">$0.00</p>
          </div>
          <div class="expense">
            <h3>Total Expense</h3>
            <p id="totalExpense">$0.00</p>
          </div>
        </div>
      </div>
      <div class="form-section">
        <h3>Add New Transaction</h3>
        <form id="transactionForm">
          <div class="form-grid">
            <div>
              <label for="type">Type</label>
              <select id="type" required>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
              </select>
            </div>
            <div>
              <label for="amount">Amount</label>
              <input type="number" id="amount" step="0.01" placeholder="$0.00" required />
            </div>
          </div>
          <div class="form-grid" style="margin-top: 16px;">
            <div>
              <label for="date">Date</label>
              <input type="date" id="date" required />
            </div>
            <div>
              <label for="category">Category</label>
              <input type="text" id="category" placeholder="e.g. Salary, Groceries" required />
            </div>
          </div>
          <button type="submit" class="add-btn">Add Transaction</button>
        </form>
      </div>
    </div>
    <div class="right-panel">
      <h2>Transaction History</h2>
      <div class="transaction-list" id="transactionList"></div>
      <footer>
        <div>© Just For Fun.</div>
      </footer>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
